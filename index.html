<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0, viewport-fit=cover"
  >

  <title>Pourquoi, Votre Majesté ?</title>

  <!-- 프랑스어 제목용 세리프 폰트 -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

  <link
    href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;1,400&family=Noto+Serif+KR:wght@400;500&display=swap"
    rel="stylesheet"
  >

  <style>
    /* ================================
       기본 설정
    ================================= */

    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      padding: 0;
      background: #000;
    }

    body {
      min-height: 100vh;
      color: #f2e8d5;
      font-family: "Noto Serif KR", serif;
      overflow-x: hidden;
    }

    button {
      font: inherit;
    }


    /* ================================
       인트로 화면
    ================================= */

    .intro {
      position: fixed;
      inset: 0;
      z-index: 1000;

      display: flex;
      align-items: center;
      justify-content: center;

      min-height: 100vh;
      min-height: 100dvh;

      padding:
        env(safe-area-inset-top)
        24px
        env(safe-area-inset-bottom);

      background:
        radial-gradient(
          circle at center,
          rgba(242, 232, 213, 0.035) 0%,
          rgba(0, 0, 0, 0) 48%
        ),
        #000;

      opacity: 1;
      visibility: visible;

      transition:
        opacity 1.1s ease,
        visibility 1.1s ease;
    }

    /* 클릭 후 인트로가 사라지는 상태 */

    .intro.is-closing {
      opacity: 0;
      visibility: hidden;
      pointer-events: none;
    }


    /* ================================
       인트로 내부 콘텐츠
    ================================= */

    .intro-content {
      width: 100%;
      max-width: 700px;

      text-align: center;

      transform: translateY(-2vh);

      animation: introAppear 1.8s ease both;
    }

    @keyframes introAppear {
      from {
        opacity: 0;
        transform: translateY(14px);
      }

      to {
        opacity: 1;
        transform: translateY(-2vh);
      }
    }


    /* ================================
       제목
    ================================= */

    .intro-title {
      margin: 0;

      color: #f2e8d5;

      font-family: "Cormorant Garamond", serif;
      font-size: clamp(48px, 8vw, 76px);
      font-weight: 400;
      font-style: italic;

      line-height: 0.9;
      letter-spacing: 0.01em;

      text-shadow:
        0 0 18px rgba(242, 232, 213, 0.05),
        0 0 42px rgba(242, 232, 213, 0.025);
    }

    .intro-title span {
      display: block;
    }

    .intro-title span:last-child {
      margin-top: 12px;
    }


    /* ================================
       기억 회상하기 버튼
    ================================= */

    .memory-button {
      position: relative;
      isolation: isolate;
      overflow: hidden;

      min-width: 230px;
      margin-top: 68px;
      padding: 17px 38px;

      color: rgba(242, 232, 213, 0.8);
      background: rgba(0, 0, 0, 0.15);

      border: 1px solid rgba(242, 232, 213, 0.3);
      border-radius: 0;

      font-family: "Noto Serif KR", serif;
      font-size: 16px;
      font-weight: 400;
      letter-spacing: 0.18em;

      cursor: pointer;

      box-shadow:
        inset 0 0 0 rgba(242, 232, 213, 0),
        0 0 0 rgba(242, 232, 213, 0);

      transform: scale(1);

      transition:
        color 0.4s ease,
        border-color 0.4s ease,
        background-color 0.4s ease,
        box-shadow 0.4s ease,
        transform 0.4s ease;
    }

    /* 버튼 안쪽의 은은한 배경 */

    .memory-button::before {
      content: "";

      position: absolute;
      inset: 0;
      z-index: -2;

      background:
        linear-gradient(
          90deg,
          transparent,
          rgba(242, 232, 213, 0.055),
          transparent
        );

      opacity: 0;

      transition: opacity 0.4s ease;
    }

    /* 버튼 위를 스쳐 지나가는 빛 */

    .memory-button::after {
      content: "";

      position: absolute;
      top: -70%;
      left: -55%;

      width: 30%;
      height: 240%;

      z-index: -1;

      background: linear-gradient(
        90deg,
        transparent,
        rgba(255, 255, 255, 0.24),
        transparent
      );

      transform: rotate(18deg);
      opacity: 0;
      pointer-events: none;
    }

    .memory-button:hover {
      color: #fffaf0;

      border-color: rgba(242, 232, 213, 0.75);
      background-color: rgba(242, 232, 213, 0.025);

      box-shadow:
        inset 0 0 24px rgba(242, 232, 213, 0.035),
        0 0 22px rgba(242, 232, 213, 0.08);

      transform: scale(1.03);
    }

    .memory-button:hover::before {
      opacity: 1;
    }

    .memory-button:hover::after {
      opacity: 1;
      animation: shineMove 0.85s ease forwards;
    }

    @keyframes shineMove {
      from {
        left: -55%;
      }

      to {
        left: 135%;
      }
    }

    .memory-button:focus-visible {
      outline: 1px solid rgba(255, 250, 240, 0.9);
      outline-offset: 6px;
    }

    .memory-button:active {
      transform: scale(0.99);
    }


    /* ================================
       클릭 후 콘텐츠가 사라지는 연출
    ================================= */

    .intro.is-starting .intro-title {
      animation: titleFadeOut 0.9s ease forwards;
    }

    .intro.is-starting .memory-button {
      animation: buttonFadeOut 0.65s ease forwards;
    }

    @keyframes titleFadeOut {
      to {
        opacity: 0;
        filter: blur(4px);
        transform: translateY(-10px);
      }
    }

    @keyframes buttonFadeOut {
      to {
        opacity: 0;
        filter: blur(2px);
        transform: scale(0.96);
      }
    }


    /* ================================
       웹툰 영역
    ================================= */

    .webtoon {
      width: 100%;
      max-width: 900px;

      margin: 0 auto;
      padding: 0;

      background: #000;

      opacity: 0;
      visibility: hidden;

      transition:
        opacity 1.4s ease,
        visibility 1.4s ease;
    }

    .webtoon.is-visible {
      opacity: 1;
      visibility: visible;
    }

    .webtoon img {
      display: block;

      width: 100%;
      height: auto;

      margin: 0;
      padding: 0;
    }


    /* ================================
       음악 컨트롤 버튼
    ================================= */

    .music-control {
      position: fixed;
      right: 16px;
      bottom: calc(16px + env(safe-area-inset-bottom));

      z-index: 500;

      width: 42px;
      height: 42px;

      display: flex;
      align-items: center;
      justify-content: center;

      color: rgba(242, 232, 213, 0.75);
      background: rgba(0, 0, 0, 0.55);

      border: 1px solid rgba(242, 232, 213, 0.22);
      border-radius: 50%;

      font-size: 15px;

      cursor: pointer;

      opacity: 0;
      visibility: hidden;

      backdrop-filter: blur(5px);
      -webkit-backdrop-filter: blur(5px);

      transition:
        opacity 0.5s ease,
        visibility 0.5s ease,
        border-color 0.3s ease,
        color 0.3s ease;
    }

    .music-control.is-visible {
      opacity: 1;
      visibility: visible;
    }

    .music-control:hover {
      color: #fffaf0;
      border-color: rgba(242, 232, 213, 0.65);
    }


    /* ================================
       모바일 최적화
    ================================= */

    @media (max-width: 600px) {
      .intro-content {
        transform: translateY(-4vh);
      }

      .intro-title {
        font-size: clamp(44px, 14vw, 62px);
        line-height: 0.92;
      }

      .intro-title span:last-child {
        margin-top: 8px;
      }

      .memory-button {
        min-width: 210px;

        margin-top: 54px;
        padding: 15px 28px;

        font-size: 14px;
        letter-spacing: 0.15em;
      }
    }


    /* 사용자가 애니메이션 감소를 설정한 경우 */

    @media (prefers-reduced-motion: reduce) {
      *,
      *::before,
      *::after {
        animation-duration: 0.01ms !important;
        animation-iteration-count: 1 !important;
        transition-duration: 0.01ms !important;
      }
    }
  </style>
</head>

<body>

  <!-- ================================
       첫 화면 인트로
  ================================= -->

  <section class="intro" id="intro">
    <div class="intro-content">

      <h1 class="intro-title">
        <span>Pourquoi,</span>
        <span>Votre Majesté&nbsp;?</span>
      </h1>

      <button
        class="memory-button"
        id="memoryButton"
        type="button"
      >
        기억 회상하기
      </button>

    </div>
  </section>


  <!-- ================================
       웹툰 본편
  ================================= -->

  <main class="webtoon" id="webtoon">

    <img
      src="images/1.png"
      alt="웹툰 첫 번째 이미지"
    >

    <img
      src="images/2.png"
      alt="웹툰 두 번째 이미지"
      loading="lazy"
    >

    <img
      src="images/3.png"
      alt="웹툰 세 번째 이미지"
      loading="lazy"
    >

    <img
      src="images/4.png"
      alt="웹툰 네 번째 이미지"
      loading="lazy"
    >

  </main>


  <!-- ================================
       배경 음악
  ================================= -->

  <audio
    id="bgm"
    src="audio/BGM.mp3"
    loop
    preload="auto"
  ></audio>


  <!-- 음악 켜기 / 끄기 -->

  <button
    class="music-control"
    id="musicControl"
    type="button"
    aria-label="배경 음악 끄기"
    title="배경 음악 끄기"
  >
    ♪
  </button>


  <script>
    const intro = document.getElementById("intro");
    const memoryButton = document.getElementById("memoryButton");
    const webtoon = document.getElementById("webtoon");

    const bgm = document.getElementById("bgm");
    const musicControl = document.getElementById("musicControl");

    let hasStarted = false;
    let isMusicPlaying = false;


    /* ================================
       기억 회상하기 버튼 클릭
    ================================= */

    memoryButton.addEventListener("click", async () => {
      if (hasStarted) return;

      hasStarted = true;
      memoryButton.disabled = true;

      intro.classList.add("is-starting");

      /* 사용자 클릭 직후 음악 재생 시도 */
      try {
        bgm.volume = 0;
        await bgm.play();

        isMusicPlaying = true;

        fadeInMusic();
      } catch (error) {
        console.log("배경 음악을 재생하지 못했습니다.", error);
        isMusicPlaying = false;
      }

      /* 제목과 버튼이 먼저 사라짐 */
      setTimeout(() => {
        intro.classList.add("is-closing");
      }, 850);

      /* 웹툰 본편 등장 */
      setTimeout(() => {
        webtoon.classList.add("is-visible");
        musicControl.classList.add("is-visible");

        window.scrollTo({
          top: 0,
          behavior: "instant"
        });
      }, 1250);

      /* 인트로 요소를 완전히 숨김 */
      setTimeout(() => {
        intro.style.display = "none";
      }, 2400);
    });


    /* ================================
       음악 페이드인
    ================================= */

    function fadeInMusic() {
      const targetVolume = 0.55;
      const fadeDuration = 1800;
      const intervalTime = 50;

      const volumeStep =
        targetVolume / (fadeDuration / intervalTime);

      const fadeInterval = setInterval(() => {
        if (bgm.volume < targetVolume) {
          bgm.volume = Math.min(
            targetVolume,
            bgm.volume + volumeStep
          );
        } else {
          clearInterval(fadeInterval);
        }
      }, intervalTime);
    }


    /* ================================
       음악 켜기 / 끄기
    ================================= */

    musicControl.addEventListener("click", async () => {
      if (isMusicPlaying) {
        bgm.pause();

        isMusicPlaying = false;

        musicControl.textContent = "♩";
        musicControl.setAttribute(
          "aria-label",
          "배경 음악 켜기"
        );
        musicControl.title = "배경 음악 켜기";
      } else {
        try {
          await bgm.play();

          isMusicPlaying = true;

          musicControl.textContent = "♪";
          musicControl.setAttribute(
            "aria-label",
            "배경 음악 끄기"
          );
          musicControl.title = "배경 음악 끄기";
        } catch (error) {
          console.log("배경 음악을 재생하지 못했습니다.", error);
        }
      }
    });
  </script>

</body>
</html>
